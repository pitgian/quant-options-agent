name: Fetch Options Data

on:
  schedule:
    # Every 5 minutes during US market hours (13:00-20:55 UTC, covers full market session)
    - cron: '*/5 13-20 * * 1-5'
    # Every 3 hours outside market hours (market is closed, no real-time changes)
    - cron: '0 0-12,21-23/3 * * 1-5'
    # Every 6 hours on weekends (market is closed)
    - cron: '0 */6 * * 0,6'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Previene esecuzioni simultanee - accoda le nuove esecuzioni
concurrency:
  group: fetch-options-data
  cancel-in-progress: false

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          
      - name: Fetch options data
        timeout-minutes: 20
        run: |
          python scripts/fetch_options_data.py --symbol ALL --output data/options_data.json
          python scripts/run_kronos.py
        env:
          TZ: America/New_York
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          
      - name: Commit and push changes
        run: |
          # 1. Back up generated data files
          mkdir -p /tmp/options_data_backup
          cp data/options_data.json data/kronos_forecast.json /tmp/options_data_backup/
          
          # 2. Configure Git
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 3. Fetch remote data branch to check if it exists
          git fetch origin data || true
          
          # 4. Checkout or create data branch
          if git show-ref --quiet refs/remotes/origin/data; then
            git checkout -B data origin/data
          else
            git checkout --orphan data
            git rm -rf .
          fi
          
          # 5. Restore generated data files
          mkdir -p data
          cp /tmp/options_data_backup/* data/
          
          # 6. Commit and push
          git add data/options_data.json data/kronos_forecast.json
          
          # Check if there are differences to commit
          if git diff --quiet && git diff --staged --quiet; then
            echo "Nessun cambiamento da committare"
            exit 0
          fi
          
          git commit -m "chore: update options data"
          
          # Push to origin data branch
          for i in 1 2 3; do
            if git push origin data; then
              echo "Push successful"
              exit 0
            fi
            echo "Push failed, attempt $i. Fetching and rebasing..."
            git fetch origin data
            git rebase --autostash origin/data || {
              git rebase --abort 2>/dev/null || true
              git reset --hard origin/data
              mkdir -p data
              cp /tmp/options_data_backup/* data/
              git add data/options_data.json data/kronos_forecast.json
              git commit -m "chore: update options data" || true
            }
          done
          
          echo "Push failed after 3 attempts"
          exit 1
