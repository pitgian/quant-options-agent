name: Fetch Options Data

on:
  schedule:
    # US Session (14:30-21:00 UTC = 9:30 AM - 4:00 PM ET) - Every hour (reduced from 30min to avoid AI rate limits)
    - cron: '0 15-20 * * 1-5'            # 15:00-20:00 UTC (covers 10:00-15:00 ET)
    - cron: '30 14 * * 1-5'              # 14:30 UTC (covers 9:30 ET)
    - cron: '0 21 * * 1-5'               # 21:00 UTC (covers 16:00 ET)
    # Outside US Session - Every 2 hours (reduced from hourly to minimize AI API calls)
    - cron: '0 0,2,4,6,8,10,12 * * 1-5' # Every 2 hours before US session
    - cron: '0 22 * * 1-5'               # 22:00 UTC (after US session)
  workflow_dispatch: # Manual trigger
    inputs:
      skip_ai_analysis:
        description: 'Skip AI analysis (true/false)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# Opt into Node.js 24 for JavaScript actions to resolve deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Previene esecuzioni simultanee - accoda le nuove esecuzioni
concurrency:
  group: fetch-options-data
  cancel-in-progress: false

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          
      - name: Determine AI analysis setting
        id: ai_config
        run: |
          # For manual triggers, respect the user's choice
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip_ai=${{ github.event.inputs.skip_ai_analysis || 'false' }}" >> $GITHUB_OUTPUT
            echo "📋 Manual trigger — skip_ai=${{ github.event.inputs.skip_ai_analysis || 'false' }}"
            exit 0
          fi

          # For scheduled runs, only enable AI during US market hours (14:30-21:00 UTC)
          # to reduce API call frequency and avoid rate limits
          CURRENT_HOUR=$(date -u +%H)
          CURRENT_MIN=$(date -u +%M)
          CURRENT_TIME=$((CURRENT_HOUR * 60 + CURRENT_MIN))

          # US market hours in UTC minutes: 14:30 (870) to 21:00 (1260)
          if [ "$CURRENT_TIME" -ge 870 ] && [ "$CURRENT_TIME" -le 1260 ]; then
            echo "skip_ai=false" >> $GITHUB_OUTPUT
            echo "🤖 US market hours detected ($CURRENT_HOUR:$CURRENT_MIN UTC) — AI analysis ENABLED"
          else
            echo "skip_ai=true" >> $GITHUB_OUTPUT
            echo "⏸️ Outside US market hours ($CURRENT_HOUR:$CURRENT_MIN UTC) — AI analysis SKIPPED"
          fi

      - name: Fetch options data
        timeout-minutes: 20
        run: |
          python scripts/fetch_options_data.py --symbol ALL --output data/options_data.json
        env:
          TZ: America/New_York
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          SKIP_AI_ANALYSIS: ${{ steps.ai_config.outputs.skip_ai }}
          
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Aggiungi il file
          git add data/options_data.json
          
          # Verifica se ci sono cambiamenti
          if git diff --quiet && git diff --staged --quiet; then
            echo "Nessun cambiamento da committare"
            exit 0
          fi
          
          # Commit
          git commit -m "chore: update options data [skip ci]"
          
          # Fetch latest from remote first
          git fetch origin master
          
          # Rebase onto remote master to avoid conflicts
          # Usa --autostash per gestire eventuali modifiche non committed
          git rebase --autostash origin/master || {
            echo "Conflitto rilevato, risoluzione automatica..."
            # Se rebase fallisce, abort
            git rebase --abort 2>/dev/null || true
            # Reset hard to remote e ri-applica le modifiche
            git reset --hard origin/master
            # Ri-aggiungi il file generato
            git add data/options_data.json
            git commit -m "chore: update options data [skip ci]" || true
          }
          
          # Push con retry e force-with-lease per sicurezza
          for i in 1 2 3; do
            if git push origin master; then
              echo "Push successful"
              exit 0
            fi
            echo "Push failed, attempt $i. Fetching and rebasing..."
            git fetch origin master
            git rebase --autostash origin/master || {
              git rebase --abort 2>/dev/null || true
              git reset --hard origin/master
              git add data/options_data.json
              git commit -m "chore: update options data [skip ci]" || true
            }
          done
          
          echo "Push failed after 3 attempts"
          exit 1
