name: Fetch Options Data

on:
  schedule:
    # US Session (14:30-21:00 UTC = 9:30 AM - 4:00 PM ET) - Every 15 minutes
    - cron: '0,15,30,45 15-20 * * 1-5'   # 15:00-20:45 UTC (covers 10:00-15:45 ET)
    - cron: '30,45 14 * * 1-5'           # 14:30-14:45 UTC (covers 9:30-9:45 ET)
    - cron: '0,15 21 * * 1-5'            # 21:00-21:15 UTC (covers 16:00-16:15 ET)
    # Outside US Session - Every hour
    - cron: '0 0-13 * * 1-5'             # 00:00-13:00 UTC (before US session)
    - cron: '0 22-23 * * 1-5'            # 22:00-23:00 UTC (after US session)
  workflow_dispatch: # Manual trigger

# Opt into Node.js 24 for JavaScript actions to resolve deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Previene esecuzioni simultanee - accoda le nuove esecuzioni
concurrency:
  group: fetch-options-data
  cancel-in-progress: false

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          
      - name: Fetch options data
        timeout-minutes: 15
        run: |
          python scripts/fetch_options_data.py --symbol ALL --output data/options_data.json
        env:
          TZ: America/New_York
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Aggiungi il file
          git add data/options_data.json
          
          # Verifica se ci sono cambiamenti
          if git diff --quiet && git diff --staged --quiet; then
            echo "Nessun cambiamento da committare"
            exit 0
          fi
          
          # Commit
          git commit -m "chore: update options data [skip ci]"
          
          # Fetch latest from remote first
          git fetch origin master
          
          # Rebase onto remote master to avoid conflicts
          # Usa --autostash per gestire eventuali modifiche non committed
          git rebase --autostash origin/master || {
            echo "Conflitto rilevato, risoluzione automatica..."
            # Se rebase fallisce, abort
            git rebase --abort 2>/dev/null || true
            # Reset hard to remote e ri-applica le modifiche
            git reset --hard origin/master
            # Ri-aggiungi il file generato
            git add data/options_data.json
            git commit -m "chore: update options data [skip ci]" || true
          }
          
          # Push con retry e force-with-lease per sicurezza
          for i in 1 2 3; do
            if git push origin master; then
              echo "Push successful"
              exit 0
            fi
            echo "Push failed, attempt $i. Fetching and rebasing..."
            git fetch origin master
            git rebase --autostash origin/master || {
              git rebase --abort 2>/dev/null || true
              git reset --hard origin/master
              git add data/options_data.json
              git commit -m "chore: update options data [skip ci]" || true
            }
          done
          
          echo "Push failed after 3 attempts"
          exit 1
