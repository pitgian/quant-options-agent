name: Fetch Options Data

on:
  schedule:
    # Every 5 minutes during US market hours (13:00-20:55 UTC, covers full market session)
    - cron: '*/5 13-20 * * 1-5'
    # Every 3 hours outside market hours (market is closed, no real-time changes)
    - cron: '0 0-12,21-23/3 * * 1-5'
    # Every 6 hours on weekends (market is closed)
    - cron: '0 */6 * * 0,6'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Previene esecuzioni simultanee - accoda le nuove esecuzioni
concurrency:
  group: fetch-options-data
  cancel-in-progress: false

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          
      - name: Fetch options data
        timeout-minutes: 20
        run: |
          python scripts/fetch_options_data.py --symbol ALL --output data/options_data.json
          python scripts/run_kronos.py
        env:
          TZ: America/New_York
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          
      - name: Commit and push to Gist
        run: |
          # Check if secrets are provided
          if [ -z "${{ secrets.GH_PAT }}" ] || [ -z "${{ secrets.GIST_ID }}" ]; then
            echo "GH_PAT or GIST_ID secret is missing. Skipping Gist update."
            exit 0
          fi

          # 1. Clone the gist repository
          git clone https://${{ secrets.GH_PAT }}@gist.github.com/${{ secrets.GIST_ID }}.git gist_repo
          
          # 2. Copy the generated files
          cp data/options_data.json gist_repo/
          cp data/kronos_forecast.json gist_repo/
          
          # 3. Configure Git and commit
          cd gist_repo
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add options_data.json kronos_forecast.json
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "Nessun cambiamento da committare nel gist"
            exit 0
          fi
          
          git commit -m "chore: update options data"
          
          # 4. Push to Gist
          for i in 1 2 3; do
            if git push origin main || git push origin master; then
              echo "Push to Gist successful"
              exit 0
            fi
            echo "Push failed, attempt $i. Fetching and rebasing..."
            git pull --rebase origin main || git pull --rebase origin master
          done
          
          echo "Push failed after 3 attempts"
          exit 1
